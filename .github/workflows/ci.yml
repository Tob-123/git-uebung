name: Python Qualität und Sicherheit

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python installieren
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 1. Syntax Check (Compile)
      run: python -m compileall .

    - name: 2. Automatisierte Tests ausführen
      run: pytest

    - name: 3. Linting mit Ruff
      run: ruff check .

    - name: 4. Security Check mit Bandit
      run: bandit -r .

    - name: 5. pip-audit Schwachstellen-Check
      run: pip-audit -r requirements.txt -f json -o audit.json
      continue-on-error: true

    - name: 6. Audit-Bericht als Artefakt speichern
      uses: actions/upload-artifact@v4
      with:
        name: audit-report
        path: audit.json
